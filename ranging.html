<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StockFlow - Ranking</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:
    radial-gradient(circle at top,#1a1a1a,#0a0a0a 70%);
  color:#fff;

  min-height:100vh;

  padding:
    20px
    15px
    100px;
}

/* HEADER */

.header{
  margin-bottom:25px;
}

.header h1{
  font-size:28px;
  margin-bottom:6px;

  background:
    linear-gradient(
      90deg,
      #ffd700,
      #fff3b0,
      #ffd700
    );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:
    goldFlow 3s linear infinite;
}

.header p{
  color:#aaa;
  font-size:13px;
}

@keyframes goldFlow{

  0%{
    filter:brightness(1);
  }

  50%{
    filter:brightness(1.35);
  }

  100%{
    filter:brightness(1);
  }

}

/* SECTION */

.section{
  margin-bottom:28px;
}

.section-title{
  display:flex;
  align-items:center;
  justify-content:space-between;

  margin-bottom:14px;
}

.section-title h2{
  font-size:18px;
}

/* GRID */

.rank-grid{
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* CARD */

.rank-card{
  position:relative;

  overflow:hidden;

  background:#151515;

  border-radius:18px;

  padding:16px;

  border:
    1px solid
    rgba(255,255,255,0.06);

  transition:
    transform .2s ease,
    border .2s ease,
    box-shadow .2s ease;
}

.rank-card:hover{
  transform:translateY(-2px);
}

/* GOLD */

.rank-card.gold{
  background:
    linear-gradient(
      135deg,
      rgba(255,215,0,0.15),
      rgba(255,255,255,0.04)
    );

  border:
    1px solid
    rgba(255,215,0,0.4);

  box-shadow:
    0 0 20px
    rgba(255,215,0,0.15);
}

.rank-card.gold::before{
  content:"";

  position:absolute;

  top:-40%;
  left:-20%;

  width:60%;
  height:180%;

  background:
    linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,0.15),
      transparent
    );

  transform:rotate(25deg);

  animation:
    shine 3.2s linear infinite;
}

@keyframes shine{

  0%{
    left:-50%;
  }

  100%{
    left:130%;
  }

}

/* RED */

.rank-card.low{
  background:
    linear-gradient(
      135deg,
      rgba(255,0,0,0.10),
      rgba(255,255,255,0.03)
    );

  border:
    1px solid
    rgba(255,0,0,0.18);
}

/* TOP */

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:10px;

  gap:10px;
}

.product-name{
  font-size:16px;
  font-weight:700;

  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.rank-badge{
  min-width:48px;

  padding:5px 8px;

  border-radius:999px;

  text-align:center;

  font-size:12px;
  font-weight:bold;
}

.rank-badge.best{
  background:
    rgba(255,215,0,0.14);

  color:#ffd700;
}

.rank-badge.low{
  background:
    rgba(255,0,0,0.14);

  color:#ff6b6b;
}

/* STATS */

.card-stats{
  display:flex;
  flex-direction:column;
  gap:7px;
}

.stat-line{
  display:flex;
  justify-content:space-between;
  align-items:center;

  font-size:13px;
}

/* BAR */

.progress{
  margin-top:12px;

  width:100%;
  height:12px;

  border-radius:999px;

  overflow:hidden;

  background:
    rgba(255,255,255,0.05);
}

.progress-fill{
  height:100%;
  border-radius:999px;

  transition:width .4s ease;
}

.progress-fill.gold{
  background:
    linear-gradient(
      90deg,
      #b8860b,
      #ffd700,
      #fff1a8
    );

  box-shadow:
    0 0 12px
    rgba(255,215,0,0.4);
}

.progress-fill.red{
  background:
    linear-gradient(
      90deg,
      #8b0000,
      #ff4d4d
    );
}

/* EMPTY */

.empty{
  text-align:center;
  color:#777;

  padding:30px 15px;

  background:#151515;

  border-radius:16px;
}

/* NAV */

nav{
  position:fixed;
  bottom:0;
  width:100%;
  left:0;

  background:#111;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:6px 10px;
  gap:6px;

  z-index:1000;
}

nav .nav-item{
  flex:1;
  min-width:0;

  text-align:center;

  padding:7px 5px;

  border-radius:7px;

  text-decoration:none;
  color:inherit;

  font-size:11px;

  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;

  transition:.2s;
}

nav .nav-item.active{
  background:
    rgba(212,175,55,0.12);

  color:#D4AF37;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
  <h1>🏆 StockFlow Ranking</h1>
  <p>
    Classement intelligent des produits
    les plus performants.
  </p>
</div>

<!-- TOP PRODUCTS -->

<section class="section">

  <div class="section-title">
    <h2>🥇 Top Produits</h2>
  </div>

  <div class="rank-grid" id="topProducts">

    <!-- JS -->

  </div>

</section>

<!-- LOW PRODUCTS -->

<section class="section">

  <div class="section-title">
    <h2>⚠️ Produits Faibles</h2>
  </div>

  <div class="rank-grid" id="lowProducts">

    <!-- JS -->

  </div>

</section>

<nav>
  <a class="nav-item" href="index.html">
    🛒 Vente
  </a>

  <a class="nav-item" href="products.html">
    📦 Produits
  </a>

  <a class="nav-item active" href="ranking.html">
    🏆 Ranking
  </a>

  <a class="nav-item" href="stats.html">
    📊 Stats
  </a>

  <a class="nav-item" href="settings.html">
    ⚙️ Paramètres
  </a>
</nav>

<script type="module">
// js/ranking.js
import { db } from "./js/firebase.js";
import { collection,
  getDocs,
  getDoc,
  doc,
  query,
  limit from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";


/* =========================
   DOM
========================= */

const topContainer =
  document.getElementById("topProducts");

const lowContainer =
  document.getElementById("lowProducts");

/* =========================
   AUTH
========================= */

const auth = getAuth();

/* =========================
   SECURITY
========================= */

async function checkUser(uid) {

  const userRef =
    doc(db, "users", uid);

  const userSnap =
    await getDoc(userRef);

  if (!userSnap.exists()) {
    throw new Error(
      "Utilisateur introuvable"
    );
  }

  const userData =
    userSnap.data();

  if (!userData.isActive) {
    throw new Error(
      "Compte désactivé"
    );
  }

  if (
    userData.role !== "admin" &&
    userData.role !== "seller"
  ) {
    throw new Error(
      "Accès refusé"
    );
  }

  return userData;

}

/* =========================
   HELPERS
========================= */

function sanitizeText(
  value,
  max = 80
) {

  if (typeof value !== "string") {
    return "";
  }

  return value
    .trim()
    .replace(/\s+/g, " ")
    .slice(0, max);

}

function clearContainer(container) {

  if (!container) return;

  container.replaceChildren();

}

function showEmpty(container, text) {

  clearContainer(container);

  const div =
    document.createElement("div");

  div.className = "empty";

  div.textContent = text;

  container.appendChild(div);

}

function createProgressBar(
  percent,
  type
) {

  const progress =
    document.createElement("div");

  progress.className = "progress";

  const fill =
    document.createElement("div");

  fill.className =
    `progress-fill ${type}`;

  fill.style.width =
    `${Math.min(percent, 100)}%`;

  progress.appendChild(fill);

  return progress;

}

/* =========================
   CREATE CARD
========================= */

function createCard(
  item,
  type = "gold",
  position = 1
) {

  const card =
    document.createElement("div");

  card.className =
    `rank-card ${
      type === "gold"
        ? "gold"
        : "low"
    }`;

  const top =
    document.createElement("div");

  top.className = "card-top";

  const name =
    document.createElement("div");

  name.className =
    "product-name";

  name.textContent =
    sanitizeText(item.name);

  const badge =
    document.createElement("div");

  badge.className =
    `rank-badge ${
      type === "gold"
        ? "best"
        : "low"
    }`;

  badge.textContent =
    `#${position}`;

  top.append(
    name,
    badge
  );

  const stats =
    document.createElement("div");

  stats.className =
    "card-stats";

  const soldLine =
    document.createElement("div");

  soldLine.className =
    "stat-line";

  const soldLabel =
    document.createElement("span");

  soldLabel.textContent =
    "Ventes";

  const soldValue =
    document.createElement("strong");

  soldValue.textContent =
    `${item.quantity}`;

  soldLine.append(
    soldLabel,
    soldValue
  );

  const percentLine =
    document.createElement("div");

  percentLine.className =
    "stat-line";

  const percentLabel =
    document.createElement("span");

  percentLabel.textContent =
    "Part des ventes";

  const percentValue =
    document.createElement("strong");

  percentValue.textContent =
    `${item.percent}%`;

  percentLine.append(
    percentLabel,
    percentValue
  );

  const scoreLine =
    document.createElement("div");

  scoreLine.className =
    "stat-line";

  const scoreLabel =
    document.createElement("span");

  scoreLabel.textContent =
    "Cote";

  const scoreValue =
    document.createElement("strong");

  scoreValue.textContent =
    `${item.score}/10`;

  scoreLine.append(
    scoreLabel,
    scoreValue
  );

  stats.append(
    soldLine,
    percentLine,
    scoreLine
  );

  const progress =
    createProgressBar(
      item.percent,
      type
    );

  card.append(
    top,
    stats,
    progress
  );

  return card;

}

/* =========================
   LOAD RANKING
========================= */

async function loadRanking() {

  clearContainer(topContainer);
  clearContainer(lowContainer);

  const saleItemsSnap =
    await getDocs(
      query(
        collection(
          db,
          "sale_items"
        ),
        limit(5000)
      )
    );

  if (saleItemsSnap.empty) {

    showEmpty(
      topContainer,
      "Aucune vente enregistrée"
    );

    showEmpty(
      lowContainer,
      "Aucune donnée disponible"
    );

    return;

  }

  const map =
    new Map();

  let totalSold = 0;

  saleItemsSnap.forEach(docSnap => {

    const data =
      docSnap.data();

    const productId =
      data.productId;

    const quantity =
      Number(
        data.quantity || 0
      );

    totalSold += quantity;

    if (!map.has(productId)) {

      map.set(productId, {
        productId,
        quantity: 0
      });

    }

    const current =
      map.get(productId);

    current.quantity += quantity;

  });

  const productsSnap =
    await getDocs(
      collection(db, "products")
    );

  const productsMap =
    new Map();

  productsSnap.forEach(docSnap => {

    productsMap.set(
      docSnap.id,
      docSnap.data()
    );

  });

  const ranking =
    Array.from(map.values())
      .map(item => {

        const product =
          productsMap.get(
            item.productId
          ) || {};

        const percent =
          totalSold > 0
            ? (
              item.quantity
              / totalSold
            ) * 100
            : 0;

        const score =
          Math.min(
            10,
            (
              percent / 10
            ) * 10
          );

        return {
          productId:
            item.productId,

          name:
            sanitizeText(
              product.name ||
              "Produit inconnu"
            ),

          quantity:
            item.quantity,

          percent:
            Number(
              percent.toFixed(1)
            ),

          score:
            Number(
              score.toFixed(1)
            )
        };

      })
      .sort(
        (a, b) =>
          b.quantity -
          a.quantity
      );

  const topFive =
    ranking.slice(0, 5);

  const lowFive =
    [...ranking]
      .reverse()
      .slice(0, 5);

  if (!topFive.length) {

    showEmpty(
      topContainer,
      "Top indisponible"
    );

  } else {

    topFive.forEach(
      (item, index) => {

        const card =
          createCard(
            item,
            "gold",
            index + 1
          );

        topContainer.appendChild(
          card
        );

      }
    );

  }

  if (!lowFive.length) {

    showEmpty(
      lowContainer,
      "Classement faible indisponible"
    );

  } else {

    lowFive.forEach(
      (item, index) => {

        const card =
          createCard(
            item,
            "red",
            index + 1
          );

        lowContainer.appendChild(
          card
        );

      }
    );

  }

}

/* =========================
   INIT
========================= */

onAuthStateChanged(
  auth,
  async user => {

    if (!user) {

      alert(
        "Connexion requise"
      );

      window.location.replace(
        "login.html"
      );

      return;

    }

    try {

      await checkUser(
        user.uid
      );

      await loadRanking();

    } catch (err) {

      console.error(err);

      alert(
        err.message ||
        "Erreur"
      );

    }

  }
);
  
</script>

</body>
</html>
