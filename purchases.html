  <title>Stock Achats fournisseurs</title>
  <link rel="stylesheet" href="style.css">
  <style>
  body{
  padding-bottom: 92px;
}
    header {
      background: #0B3D2E;
      color: white;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header .status { font-size: 12px; color: #D4AF37; }

    .search-bar {
      padding: 10px;
      position: sticky;
      top: 0;
      background: #F5F5F5;
      z-index: 10;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding-bottom: 70px;
      background: #f5f6fa;
    }

    h2 {
      text-align: center;
      margin-top: 20px;
    }
.commande {
  width: 95%;
  margin: 15px auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.commande button {
  padding: 8px 12px;
  background: #0B3D2E;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

    form {
      max-width: 500px;
      margin: 20px auto;
      padding: 20px;
      background: #fff;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    form input, form select {
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    form button {
      padding: 10px;
      background: #192a56;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    table {
      width: 95%;
      margin: 20px auto;
      border-collapse: collapse;
      background: #fff;
    }

    table th, table td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    table th {
      background: #192a56;
      color: white;
    }
    .search-box {
  width: 95%;
  margin: 10px auto;
}

.search-box input {
  width: 90%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.filtre {
  width: 95%;
  margin: 10px auto;
  display: flex;
  justify-content: flex-end;
}

#stockFilter {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
  width: 150px;
}

#debug{
  position:fixed;
  left:50%;
  bottom:20px;
  transform:translateX(-50%);
  z-index:999999;

  max-width:90%;
  min-width:220px;

  padding:12px 16px;

  border-radius:12px;

  background:#111;
  color:#fff;

  font-size:13px;
  font-weight:600;

  text-align:center;

  opacity:0;
  pointer-events:none;

  transition:opacity .25s ease;
}

#debug.show{
  opacity:1;
}

nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;

  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 6px 10px;
  gap: 6px;

  color: white;
  z-index: 1000;

  overflow-x: hidden;
  overflow-y: hidden;
}

nav .nav-item {
  flex: 1;
  min-width: 0;

  text-align: center;
  font-size: 11px;
  cursor: pointer;

  padding: 6px 4px;
  border-radius: 6px;

  transition: 0.2s;

  text-decoration: none;
  color: inherit;

  overflow: hidden;
  text-overflow: ellipsis;

  display: flex;
  justify-content: center;
  align-items: center;
}

nav .nav-item:hover {
  background: rgba(212,175,55,0.08);
}

nav .nav-item.active {
  color: #D4AF37;
  font-weight: bold;
  background: rgba(212,175,55,0.12);
}
  </style>
</head>
<body>
<header>
  <h3>StockFlow</h3>
  <div class="status" id="status">● Online</div>
</header>

<div id="debug"></div>

<div class="commande">
<h2>Ajouter une commande fournisseur</h2>
<button>➕ Ajouter achat</button>
</div>
<form id="purchaseForm" style="display:none;">

  <label>Fournisseur :</label>
  <input type="text" id="supplierName" required>

  <label>Produit :</label>
  <select id="productSelect" required>
    <option value="">-- Sélectionner --</option>
  </select>

  <input type="text" id="productName" placeholder="Nouveau produit" style="display:none;">

  <label>Quantité :</label>
  <input type="number" id="quantity" min="1" required>

  <label>Prix unitaire (si ≠ ancien) :</label>
  <input type="number" id="unitPrice" min="0.01" step="0.01">

  <button type="submit">Ajouter commande</button>
</form>

<div class="filtre">
<select id="stockFilter">
  <option value="all">Tous</option>
  <option value="low">Stock faible</option>
</select>
</div>
<div class="search-box">
  <input type="text" id="stockSearch" placeholder="Rechercher produit...">
</div>

<h2>Stock actuel</h2>

<table id="stockTable">
  <thead>
    <tr>
      <th>Produit</th>
      <th>Stock</th>
      <th>Prix</th>
      <th>Total</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<nav class="bottom-nav">

     class="nav-item"
     data-page="index.html">
     🛒 Vente
  </a>

  </a>

     class="nav-item"
     data-page="purchases.html">
     📥 Achats
  </a>

  <a href="expensess.html"
     class="nav-item"
     data-page="expensess.html">
     ❌ Pertes
  </a>

  <a href="stats.html"
     class="nav-item"
     data-page="stats.html">
     📊 Stats
  </a>

  <a href="settings.html"
     class="nav-item"
     data-page="settings.html">
     ⚙️ Paramètres
  </a>

</nav>
<script type="module" src="js/purchases.js"></script>

<script src="js/nav.js"></script>

</body>
  </html>
